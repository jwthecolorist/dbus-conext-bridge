[modbus]
# IP address of the Conext gateway (InsightHome/InsightFacility)
ip = 192.168.1.223
# Modbus TCP port (503 for proprietary register map)
port = 503
# Socket timeout in seconds
timeout = 2

[inverters]
# Number of inverter units (1-4)
count = 2
# Comma-separated Modbus unit IDs
unit_ids = 11,12
# Polling interval in milliseconds
poll_interval_ms = 3000
# Delay between individual register reads (ms)
inter_read_delay_ms = 50

[dbus]
# Venus DBUS service type (vebus = Multi/Quattro emulation)
service_type = vebus
# Unique device instance number (avoid conflicts with real devices)
device_instance = 275
# Product name shown in Venus OS
product_name = Conext XW Pro 6848 x2 (Bridge)
# Custom name (editable in Venus settings)
custom_name = Conext XW Pro
